<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca de Prompts — Cassia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FFF9F4;
    --blush: #E8C4B0;
    --rose: #C97B5A;
    --terracotta: #A85C3A;
    --dark: #2A1F1A;
    --mid: #5C4033;
    --soft: #9E7B6A;
    --accent: #D4956A;
    --gold: #C9A96E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--dark);
    padding: 60px 40px 50px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(201,123,90,0.18) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(201,169,110,0.12) 0%, transparent 50%);
  }

  .header-tag {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
    position: relative;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 4.5rem);
    font-weight: 900;
    color: var(--warm-white);
    line-height: 1.1;
    position: relative;
  }

  header h1 span {
    color: var(--accent);
    font-style: italic;
  }

  .header-sub {
    margin-top: 16px;
    color: var(--soft);
    font-size: 15px;
    letter-spacing: 0.5px;
    position: relative;
  }

  .header-deco {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 30px;
    position: relative;
  }

  .header-deco-line {
    height: 1px;
    width: 60px;
    background: var(--gold);
    opacity: 0.5;
  }

  .header-deco-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
  }

  /* ─── SEARCH ─── */
  .search-bar {
    max-width: 600px;
    margin: 40px auto 20px;
    padding: 0 24px;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    padding: 16px 52px 16px 22px;
    border-radius: 60px;
    border: 1.5px solid var(--blush);
    background: var(--warm-white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-bar input:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 3px rgba(201,123,90,0.12);
  }

  .search-bar input::placeholder { color: var(--soft); }

  .search-icon {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--soft);
    font-size: 18px;
    pointer-events: none;
  }

  /* ─── STATS BAR ─── */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px 24px 8px;
    text-align: center;
  }

  .stat-item strong {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--terracotta);
  }

  .stat-item span {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--soft);
  }

  /* ─── CATEGORY TABS ─── */
  .tabs-wrapper {
    overflow-x: auto;
    padding: 24px 24px 0;
    scrollbar-width: none;
  }
  .tabs-wrapper::-webkit-scrollbar { display: none; }

  .tabs {
    display: flex;
    gap: 10px;
    width: max-content;
    margin: 0 auto;
  }

  .tab-btn {
    padding: 10px 22px;
    border-radius: 40px;
    border: 1.5px solid var(--blush);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab-btn:hover {
    border-color: var(--rose);
    color: var(--rose);
  }

  .tab-btn.active {
    background: var(--dark);
    border-color: var(--dark);
    color: var(--warm-white);
  }

  /* ─── MAIN GRID ─── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 36px 24px 80px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--blush);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
    margin-bottom: 48px;
  }

  /* ─── PROMPT CARD ─── */
  .card {
    background: var(--warm-white);
    border: 1.5px solid #EDE0D6;
    border-radius: 16px;
    padding: 22px 24px;
    position: relative;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(42,31,26,0.10);
    border-color: var(--rose);
  }

  .card-cat {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--rose);
    font-weight: 500;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.4;
  }

  .card-prompt {
    font-size: 13.5px;
    color: var(--mid);
    line-height: 1.65;
    flex: 1;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }

  .card-tag {
    font-size: 11px;
    background: #F0E6DD;
    color: var(--terracotta);
    padding: 4px 12px;
    border-radius: 20px;
  }

  .copy-btn {
    background: none;
    border: 1.5px solid var(--blush);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .copy-btn:hover {
    background: var(--dark);
    border-color: var(--dark);
    color: #fff;
  }

  .copy-btn.copied {
    background: #4CAF50;
    border-color: #4CAF50;
    color: #fff;
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(42,31,26,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--warm-white);
    border-radius: 20px;
    padding: 36px;
    max-width: 600px;
    width: 100%;
    position: relative;
    animation: modalIn 0.25s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-cat {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 10px;
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    margin-bottom: 16px;
    color: var(--dark);
  }

  .modal-prompt-box {
    background: var(--cream);
    border: 1px solid var(--blush);
    border-radius: 12px;
    padding: 18px 20px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--mid);
    white-space: pre-wrap;
    margin-bottom: 20px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-close {
    padding: 10px 24px;
    border-radius: 10px;
    border: 1.5px solid var(--blush);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--mid);
    cursor: pointer;
  }

  .btn-copy-full {
    padding: 10px 24px;
    border-radius: 10px;
    border: none;
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: #fff;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-copy-full:hover { background: var(--terracotta); }

  .close-x {
    position: absolute;
    top: 18px;
    right: 20px;
    font-size: 22px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--soft);
    line-height: 1;
  }

  /* ─── NO RESULTS ─── */
  .no-results {
    display: none;
    text-align: center;
    padding: 60px 24px;
    color: var(--soft);
  }

  .no-results.show { display: block; }

  /* ─── FOOTER ─── */
  footer {
    text-align: center;
    padding: 32px;
    background: var(--dark);
    color: var(--soft);
    font-size: 13px;
  }

  footer strong {
    color: var(--gold);
    font-family: 'Playfair Display', serif;
  }

  /* ─── ANIMATIONS ─── */
  .card {
    opacity: 0;
    animation: fadeUp 0.4s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    header { padding: 40px 24px 36px; }
    .stats-bar { gap: 24px; }
    .modal { padding: 24px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <p class="header-tag">✦ Coleção Exclusiva</p>
  <h1>Biblioteca de <span>Prompts</span><br>da Cassia</h1>
  <p class="header-sub">Prompts organizados para o seu dia a dia com Inteligência Artificial</p>
  <div class="header-deco">
    <div class="header-deco-line"></div>
    <div class="header-deco-dot"></div>
    <div class="header-deco-line"></div>
  </div>
</header>

<!-- SEARCH -->
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Buscar prompts…" oninput="filterAll()">
  <span class="search-icon">🔍</span>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-item"><strong id="totalCount">0</strong><span>Prompts</span></div>
  <div class="stat-item"><strong>10</strong><span>Categorias</span></div>
  <div class="stat-item"><strong id="filteredCount">0</strong><span>Visíveis</span></div>
</div>

<!-- TABS -->
<div class="tabs-wrapper">
  <div class="tabs" id="tabsContainer">
    <button class="tab-btn active" onclick="filterByCategory('all', this)">Todos</button>
  </div>
</div>

<!-- MAIN -->
<main>
  <div id="noResults" class="no-results">
    <p style="font-size:2rem">🌸</p>
    <p style="margin-top:12px">Nenhum prompt encontrado.<br>Tente outra busca.</p>
  </div>
  <div id="promptsContainer"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="close-x" onclick="closeModalDirect()">×</button>
    <p class="modal-cat" id="modalCat"></p>
    <h2 id="modalTitle"></h2>
    <div class="modal-prompt-box" id="modalPrompt"></div>
    <div class="modal-actions">
      <button class="btn-close" onclick="closeModalDirect()">Fechar</button>
      <button class="btn-copy-full" onclick="copyModalPrompt()">📋 Copiar Prompt</button>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <strong>Biblioteca da Cassia</strong> &nbsp;·&nbsp; Criada com ❤ para uso com IA
</footer>

<script>
const promptData = [
  // ── MARKETING E REDES SOCIAIS ──
  { cat: "Marketing e Redes Sociais", title: "Legenda Poderosa", prompt: "Crie uma legenda envolvente para Instagram sobre [TEMA]. Use tom [FORMAL/DESCONTRAÍDO], inclua emojis relevantes, uma chamada para ação clara e até 3 hashtags estratégicas. O objetivo é gerar engajamento e conexão com o público.", tag: "Instagram" },
  { cat: "Marketing e Redes Sociais", title: "Calendário de Conteúdo", prompt: "Monte um calendário de conteúdo para 1 semana nas redes sociais sobre [NICHO]. Inclua: tema do dia, formato sugerido (reels, carrossel, story), horário ideal de postagem e objetivo de cada conteúdo (engajamento, venda, educação).", tag: "Estratégia" },
  { cat: "Marketing e Redes Sociais", title: "Título Magnético", prompt: "Crie 10 títulos irresistíveis para um post/vídeo sobre [ASSUNTO]. Os títulos devem despertar curiosidade, ter entre 6 a 12 palavras e usar gatilhos mentais como urgência, novidade ou benefício direto.", tag: "Copywriting" },
  { cat: "Marketing e Redes Sociais", title: "Carrossel Educativo", prompt: "Crie um roteiro de carrossel com 7 slides sobre [TEMA]. Slide 1: título impactante. Slides 2 a 6: um conceito prático por slide, linguagem simples. Slide 7: conclusão + chamada para salvar ou compartilhar.", tag: "Carrossel" },
  { cat: "Marketing e Redes Sociais", title: "Script para Reels", prompt: "Escreva um script de 30 a 60 segundos para um Reels sobre [TEMA]. Estrutura: gancho nos primeiros 3 segundos, desenvolvimento rápido com 3 dicas práticas e CTA final motivador. Tom: [PROFISSIONAL/DESCONTRAÍDO].", tag: "Reels" },
  { cat: "Marketing e Redes Sociais", title: "Bio Profissional", prompt: "Crie uma bio para o Instagram de [NOME/PROFISSÃO]. Deve ter: quem é, o que faz, para quem ajuda, diferencial único e CTA (ex: link, DM ou destaque). Máximo de 150 caracteres por linha.", tag: "Perfil" },
  { cat: "Marketing e Redes Sociais", title: "Copy de Anúncio", prompt: "Escreva um anúncio para Facebook/Instagram promovendo [PRODUTO/SERVIÇO]. Inclua: headline de impacto, benefício principal, prova social (fictícia ou real), oferta e CTA urgente. Público-alvo: [DESCREVA].", tag: "Ads" },
  { cat: "Marketing e Redes Sociais", title: "Resposta a Comentário Negativo", prompt: "Me ajude a responder de forma profissional e empática o seguinte comentário negativo nas redes sociais: [COMENTÁRIO]. A resposta deve ser breve, reconhecer a insatisfação, oferecer solução e preservar a imagem da marca.", tag: "Comunidade" },
  { cat: "Marketing e Redes Sociais", title: "Ideias de Conteúdo", prompt: "Gere 15 ideias criativas de conteúdo para [NICHO/PROFISSÃO] nas redes sociais. Variar entre: conteúdo educativo, bastidores, depoimento, trend, meme do nicho e venda indireta. Liste o formato ideal para cada ideia.", tag: "Criatividade" },
  { cat: "Marketing e Redes Sociais", title: "Story Sequencial", prompt: "Crie uma sequência de 5 stories para vender [PRODUTO/SERVIÇO]. Story 1: desperte a dor. Story 2: mostre que existe solução. Story 3: apresente o produto. Story 4: prova social. Story 5: CTA com senso de urgência.", tag: "Stories" },

  // ── NEGÓCIOS E EMPREENDEDORISMO ──
  { cat: "Negócios e Empreendedorismo", title: "Plano de Negócios Rápido", prompt: "Crie um plano de negócios simplificado para [IDEIA DE NEGÓCIO]. Inclua: descrição do produto/serviço, público-alvo, problema que resolve, diferenciais, canais de venda, fontes de receita e principais desafios.", tag: "Planejamento" },
  { cat: "Negócios e Empreendedorismo", title: "Análise SWOT", prompt: "Faça uma análise SWOT completa para [NEGÓCIO/PROJETO]. Liste pelo menos 4 itens em cada quadrante: Forças, Fraquezas, Oportunidades e Ameaças. Ao final, sugira 3 ações estratégicas baseadas na análise.", tag: "Estratégia" },
  { cat: "Negócios e Empreendedorismo", title: "Proposta de Valor", prompt: "Me ajude a criar uma proposta de valor clara e poderosa para [NEGÓCIO/PRODUTO]. A proposta deve responder: o que oferece, para quem, qual problema resolve, qual o benefício principal e por que é diferente da concorrência.", tag: "Posicionamento" },
  { cat: "Negócios e Empreendedorismo", title: "Email de Vendas", prompt: "Escreva um email de vendas persuasivo para [PRODUTO/SERVIÇO]. Estrutura: assunto irresistível, abertura personalizada, identificação da dor do cliente, apresentação da solução, prova social, oferta e CTA claro. Tom: [PROFISSIONAL/PRÓXIMO].", tag: "Email" },
  { cat: "Negócios e Empreendedorismo", title: "Roteiro de Apresentação", prompt: "Crie um roteiro de apresentação de 5 minutos para [NEGÓCIO/PRODUTO]. Inclua: problema do mercado, solução proposta, como funciona, diferenciais, tração/resultados e próximos passos. Tom convincente e objetivo.", tag: "Pitch" },
  { cat: "Negócios e Empreendedorismo", title: "Precificação", prompt: "Me ajude a definir o preço ideal para [PRODUTO/SERVIÇO]. Considere: custos envolvidos, valor percebido pelo cliente, preço da concorrência, margem desejada e posicionamento da marca. Apresente 3 opções de precificação.", tag: "Finanças" },
  { cat: "Negócios e Empreendedorismo", title: "Script de Vendas", prompt: "Crie um script de vendas para abordagem [PRESENCIAL/POR WHATSAPP/LIGAÇÃO] para [PRODUTO/SERVIÇO]. Inclua: abertura, perguntas de diagnóstico, apresentação da solução, tratamento de objeções mais comuns e fechamento.", tag: "Vendas" },
  { cat: "Negócios e Empreendedorismo", title: "Política de Reembolso", prompt: "Crie uma política de reembolso clara e profissional para [TIPO DE NEGÓCIO]. Inclua: prazo para solicitação, condições aceitas, processo passo a passo e tom respeitoso que transmita segurança ao cliente.", tag: "Jurídico" },
  { cat: "Negócios e Empreendedorismo", title: "Pesquisa de Mercado", prompt: "Crie 10 perguntas para uma pesquisa de mercado sobre [PRODUTO/SERVIÇO]. As perguntas devem identificar: perfil do cliente, dores principais, hábitos de compra, quanto pagaria e o que valoriza na solução ideal.", tag: "Pesquisa" },
  { cat: "Negócios e Empreendedorismo", title: "Parceria Estratégica", prompt: "Escreva uma mensagem profissional propondo parceria entre [MEU NEGÓCIO] e [NEGÓCIO ALVO]. Destaque: sinergia entre os dois públicos, o que cada lado ganha, formatos possíveis de parceria e próximo passo para conversa.", tag: "Parcerias" },

  // ── CRIAÇÃO DE CONTEÚDO ──
  { cat: "Criação de Conteúdo", title: "Artigo Completo", prompt: "Escreva um artigo completo sobre [TEMA] com aproximadamente 800 palavras. Estrutura: introdução instigante, 3 tópicos principais com exemplos práticos, dados ou estatísticas quando possível, e conclusão com reflexão. Tom: [PROFISSIONAL/EDUCATIVO].", tag: "Blog" },
  { cat: "Criação de Conteúdo", title: "Newsletter Semanal", prompt: "Crie o conteúdo de uma newsletter semanal sobre [NICHO] para [PÚBLICO-ALVO]. Inclua: saudação personalizada, 1 insight principal, 1 dica prática, 1 curiosidade e uma CTA leve (responder, clicar ou salvar).", tag: "Email" },
  { cat: "Criação de Conteúdo", title: "Roteiro de Podcast", prompt: "Crie um roteiro para um episódio de podcast de 20 minutos sobre [TEMA]. Inclua: abertura impactante, apresentação do tema, 3 blocos de conteúdo, história ou exemplo real, reflexão final e encerramento com CTA.", tag: "Podcast" },
  { cat: "Criação de Conteúdo", title: "Descrição de Produto", prompt: "Escreva uma descrição persuasiva para [PRODUTO]. Foque em benefícios (não só características), use linguagem sensorial, inclua para quem é ideal, como usar e o resultado esperado. Finalize com frase de compra.", tag: "E-commerce" },
  { cat: "Criação de Conteúdo", title: "Thread para X/Twitter", prompt: "Crie uma thread de 8 tweets sobre [TEMA]. Tweet 1: gancho poderoso. Tweets 2 a 7: um insight ou dica por tweet, linguagem direta e concisa. Tweet 8: conclusão + pergunta para engajamento. Use números e quebras de linha.", tag: "Twitter/X" },
  { cat: "Criação de Conteúdo", title: "Storytelling Pessoal", prompt: "Me ajude a contar a história de [EXPERIÊNCIA PESSOAL/PROFISSIONAL] usando storytelling. Estrutura: cenário inicial, conflito ou desafio, virada, aprendizado e conexão com o público. Tom autêntico e inspirador.", tag: "Storytelling" },
  { cat: "Criação de Conteúdo", title: "FAQ do Produto", prompt: "Crie 10 perguntas frequentes (FAQ) com respostas para [PRODUTO/SERVIÇO]. As perguntas devem cobrir: o que é, para quem serve, como funciona, preço, prazo, garantia, suporte e resultados esperados.", tag: "FAQ" },
  { cat: "Criação de Conteúdo", title: "Reaproveitamento de Conteúdo", prompt: "Tenho este conteúdo: [COLE AQUI]. Me ajude a adaptá-lo em: 1 legenda para Instagram, 1 thread para X, 1 parágrafo para newsletter e 3 possíveis tópicos de carrossel. Mantenha a essência mas adapte o formato.", tag: "Repurpose" },
  { cat: "Criação de Conteúdo", title: "Headline Magnética", prompt: "Crie 10 opções de headline para [ARTIGO/ANÚNCIO/POST] sobre [TEMA]. Use variações de gatilhos: curiosidade, urgência, benefício, número, pergunta e controvérsia. Indique qual gatilho cada headline usa.", tag: "Copywriting" },
  { cat: "Criação de Conteúdo", title: "Conteúdo Evergreen", prompt: "Crie um conteúdo evergreen (atemporal) sobre [TEMA DO NICHO]. O conteúdo deve ser útil mesmo daqui a 2 anos, abordar uma dor recorrente do público e oferecer solução prática com exemplos concretos.", tag: "SEO" },

  // ── PRODUTIVIDADE PESSOAL ──

// State
let currentCategory = 'all';
let searchTerm = '';

// Build categories
const categories = ['Todos', ...new Set(promptData.map(p => p.cat))];
const tabsContainer = document.getElementById('tabsContainer');

categories.slice(1).forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn';
  btn.textContent = cat;
  btn.onclick = function() { filterByCategory(cat, this); };
  tabsContainer.appendChild(btn);
});

// Filter
function filterByCategory(cat, el) {
  currentCategory = cat;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderPrompts();
}

function filterAll() {
  searchTerm = document.getElementById('searchInput').value.toLowerCase();
  renderPrompts();
}

function getFiltered() {
  return promptData.filter(p => {
    const matchCat = currentCategory === 'all' || p.cat === currentCategory;
    const matchSearch = !searchTerm ||
      p.title.toLowerCase().includes(searchTerm) ||
      p.prompt.toLowerCase().includes(searchTerm) ||
      p.cat.toLowerCase().includes(searchTerm) ||
      p.tag.toLowerCase().includes(searchTerm);
    return matchCat && matchSearch;
  });
}

// Render
function renderPrompts() {
  const filtered = getFiltered();
  const container = document.getElementById('promptsContainer');
  const noResults = document.getElementById('noResults');

  document.getElementById('filteredCount').textContent = filtered.length;

  if (filtered.length === 0) {
    container.innerHTML = '';
    noResults.classList.add('show');
    return;
  }

  noResults.classList.remove('show');

  // Group by category
  const groups = {};
  filtered.forEach(p => {
    if (!groups[p.cat]) groups[p.cat] = [];
    groups[p.cat].push(p);
  });

  container.innerHTML = Object.entries(groups).map(([cat, prompts]) => `
    <h2 class="section-title">${cat}</h2>
    <div class="grid">
      ${prompts.map((p, i) => {
        const idx = promptData.indexOf(p);
        return `
        <div class="card" onclick="openModal(${idx})" style="animation-delay:${(i % 12) * 0.04}s">
          <span class="card-cat">${p.cat}</span>
          <p class="card-title">${p.title}</p>
          <p class="card-prompt">${p.prompt.substring(0, 120)}…</p>
          <div class="card-footer">
            <span class="card-tag">${p.tag}</span>
            <button class="copy-btn" onclick="event.stopPropagation(); copyQuick(this, ${idx})">
              📋 Copiar
            </button>
          </div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

// Copy quick
function copyQuick(btn, idx) {
  navigator.clipboard.writeText(promptData[idx].prompt);
  btn.textContent = '✓ Copiado!';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.innerHTML = '📋 Copiar';
    btn.classList.remove('copied');
  }, 2000);
}

// Modal
function openModal(idx) {
  const p = promptData[idx];
  document.getElementById('modalCat').textContent = p.cat + ' · ' + p.tag;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalPrompt').textContent = p.prompt;
  document.getElementById('modalOverlay').dataset.idx = idx;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function copyModalPrompt() {
  const idx = document.getElementById('modalOverlay').dataset.idx;
  navigator.clipboard.writeText(promptData[idx].prompt);
  const btn = document.querySelector('.btn-copy-full');
  btn.textContent = '✓ Copiado com sucesso!';
  setTimeout(() => { btn.textContent = '📋 Copiar Prompt'; }, 2000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

// Init
document.getElementById('totalCount').textContent = promptData.length;
document.getElementById('filteredCount').textContent = promptData.length;
renderPrompts();
</script>
</body>
</html>
